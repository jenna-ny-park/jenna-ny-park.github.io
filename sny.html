<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memo App — Advanced</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e5e7eb;
      --primary: #2563eb;
      --danger: #ef4444;
      --done: #6b7280;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: grid;
      place-items: start center;
      min-height: 100dvh;
      padding: 24px;
    }

    .app { width: 100%; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }

    .composer { padding: 16px; display: grid; gap: 12px; }
    .hstack { display: flex; align-items: center; gap: 8px; }
    .fields { display: grid; gap: 8px; }

    .line {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) 120px 96px auto;
      align-items: center;
      gap: 8px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font: inherit;
      outline: none;
      background: #fff;
    }

    input[type="checkbox"] { width: 18px; height: 18px; }

    .title-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
    .title-sub { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }

    .right { justify-self: end; margin-left: auto; }
    .hint { color: var(--muted); font-size: 14px; }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: box-shadow .15s ease, transform .02s ease;
    }

    button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    button.ghost { background: #fff; }
    button.icon { width: 36px; height: 36px; border-radius: 9px; font-size: 18px; line-height: 1; }
    button.danger { border-color: var(--danger); color: var(--danger); }
    button.sort-on { background: var(--danger); color: #fff; border-color: var(--danger); }
    button:active { transform: translateY(1px); }

    .stack-wrap { padding: 8px 16px 0; display: grid; gap: 8px; }
    .stack-toolbar { display: grid; grid-template-columns: 1fr auto; align-items: center; }
    .stack {
      margin-top: 8px;
      padding: 0 0 16px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .memo-card {
      position: relative;
      overflow: visible;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      display: grid;
      gap: 8px;
      background: var(--card);
    }

    .memo-head {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding-right: 64px;
    }

    .memo-card[draggable="true"] { cursor: grab; }
    .memo-card.dragging { opacity: .6; }
    .memo-card.drag-over { outline: 2px dashed var(--primary); }

    .list { display: grid; gap: 8px; }
    .ts {
      color: var(--muted);
      font-size: 12px;
      position: absolute;
      top: 8px;
      right: 36px;
    }

    .empty { color: var(--muted); text-align: center; padding: 18px; }
    .btns { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .urgent { border-color: var(--primary); color: #fff; background: var(--primary); }
    .urgent.active { border-color: var(--danger); background: var(--danger); }

    .done-text { color: var(--done); text-decoration: line-through; }
    .alert-text { color: var(--danger); font-weight: 700; }
    .line-time {
      color: var(--muted);
      font-size: 12px;
      margin-left: 8px;
      white-space: nowrap;
    }

    .prio-seg {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      width: 100%;
    }

    .prio-seg .seg {
      flex: 1 1 0;
      padding: 6px 0;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      background: #fff;
      border-right: 1px solid var(--border);
      border-radius: 0;
      text-align: center;
    }

    .prio-seg .seg:first-child {
      border-top-left-radius: 10px;
      border-bottom-left-radius: 10px;
    }

    .prio-seg .seg:last-child {
      border-right: none;
      border-top-right-radius: 10px;
      border-bottom-right-radius: 10px;
    }

    .prio-seg .seg.active {
      background: var(--primary);
      color: #fff;
    }

    .sub-seg .seg {
      font-size: 12px;
      padding: 4px 0;
    }

    .memo-title { font-size: 18px; }

    .memo-subtitle,
    .section-subtitle {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
    }

    .section-subtitle {
      font-size: 17px;
    }

    .memo-text {
      font-size: 15px;
      white-space: pre-wrap !important;
      word-break: break-word;
    }

    .layout {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 16px;
      width: 100%;
      min-height: 100dvh;
    }

    #mainCol .stack {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-content: start;
    }

    #sPanel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100dvh - 24px);
      position: sticky;
      top: 12px;
      overflow: hidden;
    }

    .panel-head {
      font-weight: 700;
      font-size: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .panel-list {
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .sline {
      display: grid;
      grid-template-columns: auto auto auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: #fff;
    }

    .sline .badge {
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 0 8px;
      line-height: 20px;
    }

    .sline .s-text {
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .sline .s-meta {
      grid-column: 1 / -1;
      font-size: 12px;
      color: var(--muted);
      margin-left: 26px;
    }

    .menu {
      position: absolute;
      top: 32px;
      right: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      padding: 6px;
      min-width: 160px;
      display: none;
      z-index: 30;
    }

    .menu.open { display: block; }

    .menu button {
      width: 100%;
      background: transparent;
      border: 0;
      text-align: left;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .menu button:hover { background: #f5f5f5; }

    .submenu {
      position: absolute;
      top: 0;
      left: calc(100% + 6px);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      padding: 8px;
      min-width: 180px;
      display: none;
      z-index: 40;
    }

    .submenu.open { display: block; }

    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(6, 24px);
      gap: 8px;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,.12);
      cursor: pointer;
    }

    .kebab {
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: 0;
      padding: 4px 6px;
      font-size: 18px;
      color: var(--muted);
      z-index: 20;
    }

    .line textarea.memo-edit {
      width: 100%;
      min-height: 28px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 15px;
      line-height: 1.5;
    }

    .tag-select {
      width: 100%;
      min-width: 0;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font: inherit;
      background: #fff;
    }

    .tag-badge {
      width: 100%;
      min-width: 0;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 12px;
      text-align: center;
      background: #fff;
      color: var(--text);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .memo-line-group,
    .section-card {
      display: grid;
      gap: 6px;
      padding: 6px 0;
      border-top: 1px dashed rgba(0,0,0,0.08);
    }

    .memo-line-group:first-child,
    .section-card:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .memo-cell {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle-progress {
      width: 22px;
      height: 22px;
      min-width: 22px;
      padding: 0;
      border: 0;
      background: transparent;
      border-radius: 6px;
      color: var(--muted);
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: rotate(0deg);
      transition: transform .15s ease, color .15s ease;
    }

    .toggle-progress.open {
      transform: rotate(180deg);
      color: var(--text);
    }

    .memo-text-btn {
      min-width: 0;
      flex: 1 1 auto;
      padding: 0;
      border: 0;
      background: transparent;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    .progress-panel {
      margin-left: 30px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.6);
      padding: 10px;
      display: none;
      gap: 10px;
    }

    .progress-panel.open { display: grid; }

    .progress-list {
      display: grid;
      gap: 8px;
    }

    .progress-empty {
      font-size: 13px;
      color: var(--muted);
    }

    .progress-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      display: grid;
      gap: 4px;
    }

    .progress-item-text {
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .progress-item-ts {
      font-size: 12px;
      color: var(--muted);
    }

    .progress-form {
      display: grid;
      gap: 8px;
    }

    .progress-input {
      min-height: 72px;
      resize: vertical;
    }

    .progress-actions {
      display: flex;
      justify-content: flex-end;
    }

    .section-head {
      display: grid;
      grid-template-columns: 1fr 120px auto;
      gap: 8px;
      align-items: center;
    }

    .section-meta {
      font-size: 12px;
      color: var(--muted);
      justify-self: end;
    }

    .section-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="hstack" style="margin-bottom:12px; gap:8px;">
      <button id="exportBtn" type="button">저장하기</button>
      <button id="importBtn" type="button">불러오기</button>
      <button id="groupBtn" type="button">Group</button>
      <input id="importFileInput" type="file" accept="application/json" style="display:none;" />
    </div>

    <section class="card" id="composerCard">
      <div class="composer">
        <div class="title-row">
          <input id="titleInput" type="text" placeholder="(제목)" />
          <button id="saveBtn" type="button" class="primary right" title="Save memo">Save</button>
        </div>

        <div class="title-sub">
          <input id="subtitleInput" type="text" placeholder="(소제목)" />
          <div class="hstack">
            <span class="hint">중요도</span>
            <div id="prioritySeg" class="prio-seg"></div>
          </div>
        </div>

        <div class="fields">
          <div id="lines"></div>
          <div class="hstack right">
            <button id="addLineBtn" type="button" class="icon ghost" title="Add line">+</button>
          </div>
        </div>
      </div>

      <div class="stack-wrap">
        <div class="stack-toolbar">
          <div class="hint">메모</div>
          <div class="hstack">
            <button id="sortBtn" type="button" class="ghost" title="Sort by priority">Sort</button>
          </div>
        </div>

        <div class="layout">
          <section id="mainCol">
            <div class="stack" id="memoStack">
              <div class="empty" id="emptyState">No memos yet. Your saved memos will appear here.</div>
            </div>
          </section>

          <aside id="sPanel">
            <div class="panel-head">샘플링 모아보기</div>
            <div id="sList" class="panel-list"></div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'memoApp.memos.v4';
    const DEFAULT_BG = '#FFE4C4';
    const COLOR_OPTIONS = [
      '#FD8A8A', '#FFCBCB', '#9EA1D4', '#F1F7B5', '#A8D1D1',
      '#DFEBEB', '#C3DCD8', '#EFD1D4', '#FBE8ED', '#DBD9DA',
      '#EFE1E1', '#F0D2DA', '#E0C1C6', '#D1B4C6', '#CBC4D6',
      '#EADBDD', '#FCD5CE', '#FFCAD4', '#FADDE1', '#FFF1F5',
      '#F6EEE9'
    ];
    const TAG_OPTIONS = ['리뉴얼', '입점', '분쟁', '프로젝트', '기타이슈'];

    const state = {
      memos: [],
      composer: {
        title: '',
        subtitle: '',
        priority: 3,
        lines: []
      },
      sortMode: 'time',
      editingMemoId: null,
      editDraft: null,
      editingSection: null, // { memoId, sectionId }
      editSectionDraft: null,
      openProgress: {}
    };

    const titleInput = document.getElementById('titleInput');
    const subtitleInput = document.getElementById('subtitleInput');
    const prioritySegEl = document.getElementById('prioritySeg');
    const saveBtn = document.getElementById('saveBtn');
    const addLineBtn = document.getElementById('addLineBtn');
    const sortBtn = document.getElementById('sortBtn');
    const groupBtn = document.getElementById('groupBtn');
    const linesEl = document.getElementById('lines');
    const stack = document.getElementById('memoStack');
    const emptyState = document.getElementById('emptyState');

    const nowStamp = () => new Date().toLocaleString();
    const uid = () => Math.random().toString(36).slice(2, 10);
    const persist = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state.memos));

    function clampPrio(p) {
      p = parseInt(p, 10) || 3;
      return Math.max(1, Math.min(5, p));
    }

    function stampToTime(stamp) {
      const t = new Date(stamp).getTime();
      return Number.isFinite(t) ? t : 0;
    }

    function ensureLineDefaults(line) {
      if (!line.id) line.id = uid();
      if (line.subPrio == null) line.subPrio = 2;
      if (line.tag == null) line.tag = '';
      if (!Array.isArray(line.progressLogs)) line.progressLogs = [];
      return line;
    }

    function ensureMemoDefaults(m) {
      if (!m.id) m.id = uid();
      if (!m.bg) m.bg = DEFAULT_BG;
      if (Array.isArray(m.sections)) {
        m.sections.forEach(s => {
          if (!s.id) s.id = uid();
          if (s.priority == null) s.priority = 3;
          if (s.urgent == null) s.urgent = false;
          if (!Array.isArray(s.lines)) s.lines = [];
          s.lines.forEach(l => ensureLineDefaults(l));
        });
      } else {
        if (m.priority == null) m.priority = 3;
        if (m.urgent == null) m.urgent = false;
        if (!Array.isArray(m.lines)) m.lines = [];
        m.lines.forEach(l => ensureLineDefaults(l));
      }
      return m;
    }

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) state.memos = JSON.parse(raw) || [];
        state.memos = state.memos.map(m => ensureMemoDefaults(m));
      } catch (_) {}
    }

    function isMergedMemo(m) {
      return Array.isArray(m.sections);
    }

    function sectionPriorityValue(s) {
      return s.urgent ? 10 : (parseInt(s.priority, 10) || 0);
    }

    function memoPriorityValue(m) {
      if (isMergedMemo(m)) return Math.max(0, ...m.sections.map(s => sectionPriorityValue(s)));
      return m.urgent ? 10 : (parseInt(m.priority, 10) || 0);
    }

    function memoMaxSubPrio(m) {
      if (isMergedMemo(m)) {
        return Math.max(0, ...m.sections.flatMap(s => (s.lines || []).map(l => parseInt(l.subPrio, 10) || 0)));
      }
      return Math.max(0, ...(m.lines || []).map(l => parseInt(l.subPrio, 10) || 0));
    }

    function sortLinesBySubPrio(lines, original) {
      const arr = (lines || []).slice();
      arr.sort((a, b) => {
        const diff = (parseInt(b.subPrio, 10) || 0) - (parseInt(a.subPrio, 10) || 0);
        if (diff) return diff;
        return original.indexOf(a) - original.indexOf(b);
      });
      return arr;
    }

    function updateSortButton() {
      if (state.sortMode === 'priority') sortBtn.classList.add('sort-on');
      else sortBtn.classList.remove('sort-on');
    }

    function progressKey(memoId, lineId) {
      return `${memoId}::${lineId}`;
    }

    function isProgressOpen(memoId, lineId) {
      return !!state.openProgress[progressKey(memoId, lineId)];
    }

    function toggleProgress(memoId, lineId) {
      const key = progressKey(memoId, lineId);
      state.openProgress[key] = !state.openProgress[key];
      renderSaved();
    }

    function ensureAtLeastOneLine() {
      if (!Array.isArray(state.composer.lines)) state.composer.lines = [];
      if (state.composer.lines.length === 0) {
        state.composer.lines.push(ensureLineDefaults({
          id: uid(), text: '', checked: false, checkedAt: null, subPrio: 2, tag: '', progressLogs: []
        }));
      }
    }

    function addLine(text = '', checked = false) {
      state.composer.lines.push(ensureLineDefaults({
        id: uid(), text, checked, checkedAt: null, subPrio: 2, tag: '', progressLogs: []
      }));
      renderComposerLines();
    }

    function removeLine(id) {
      if (state.composer.lines.length <= 1) return;
      state.composer.lines = state.composer.lines.filter(l => l.id !== id);
      renderComposerLines();
    }

    function renderComposerLines() {
      ensureAtLeastOneLine();
      linesEl.innerHTML = '';

      state.composer.lines.forEach((line) => {
        ensureLineDefaults(line);

        const row = document.createElement('div');
        row.className = 'line';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !!line.checked;
        cb.addEventListener('change', () => {
          line.checked = cb.checked;
          line.checkedAt = cb.checked ? nowStamp() : null;
        });

        const text = document.createElement('input');
        text.type = 'text';
        text.placeholder = '(memo)';
        text.value = line.text || '';
        text.addEventListener('input', () => { line.text = text.value; });

        const sub = document.createElement('div');
        renderSubPrioSeg(sub, line.subPrio ?? 2, (val) => {
          line.subPrio = val;
          renderComposerLines();
        });

        const tagSel = document.createElement('select');
        tagSel.className = 'tag-select';
        const emptyOpt = document.createElement('option');
        emptyOpt.value = '';
        emptyOpt.textContent = '태그';
        tagSel.appendChild(emptyOpt);

        TAG_OPTIONS.forEach(tag => {
          const opt = document.createElement('option');
          opt.value = tag;
          opt.textContent = tag;
          if ((line.tag || '') === tag) opt.selected = true;
          tagSel.appendChild(opt);
        });

        tagSel.addEventListener('change', () => { line.tag = tagSel.value; });

        const ctrls = document.createElement('div');
        ctrls.className = 'hstack right';
        if (state.composer.lines.length > 1) {
          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'icon danger';
          removeBtn.title = 'Remove line';
          removeBtn.textContent = '−';
          removeBtn.addEventListener('click', () => removeLine(line.id));
          ctrls.appendChild(removeBtn);
        }

        row.appendChild(cb);
        row.appendChild(text);
        row.appendChild(sub);
        row.appendChild(tagSel);
        row.appendChild(ctrls);
        linesEl.appendChild(row);
      });
    }

    function getDisplayItems() {
      const items = state.memos.slice();
      if (state.sortMode === 'priority') {
        items.sort((a, b) => {
          const ap = memoPriorityValue(a);
          const bp = memoPriorityValue(b);
          if (bp !== ap) return bp - ap;
          const as = memoMaxSubPrio(a);
          const bs = memoMaxSubPrio(b);
          if (bs !== as) return bs - as;
          return stampToTime(b.createdAt) - stampToTime(a.createdAt);
        });
      }
      return items;
    }

    function clearEditStates() {
      state.editingMemoId = null;
      state.editDraft = null;
      state.editingSection = null;
      state.editSectionDraft = null;
    }

    function renderSaved() {
      stack.querySelectorAll('.memo-card').forEach(n => n.remove());

      if (state.memos.length === 0) {
        emptyState.style.display = 'block';
        renderSPanel();
        return;
      }
      emptyState.style.display = 'none';

      const items = getDisplayItems();

      items.forEach(m => {
        const card = document.createElement('article');
        card.className = 'memo-card';
        card.style.background = m.bg || DEFAULT_BG;
        card.dataset.id = m.id;

        if (!isMergedMemo(m) && state.sortMode === 'time' && state.editingMemoId !== m.id) {
          card.setAttribute('draggable', 'true');
          card.addEventListener('dragstart', handleDragStart);
          card.addEventListener('dragover', handleDragOver);
          card.addEventListener('dragleave', handleDragLeave);
          card.addEventListener('drop', handleDrop);
          card.addEventListener('dragend', handleDragEnd);
        }

        if (isMergedMemo(m)) {
          renderMergedCard(card, m);
        } else if (state.editingMemoId === m.id) {
          renderEditCard(card, m);
        } else {
          renderReadCard(card, m);
        }

        stack.appendChild(card);
      });

      renderSPanel();
    }

    let dragSrcId = null;

    function handleDragStart(e) {
      dragSrcId = this.dataset.id;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
      e.preventDefault();
      this.classList.add('drag-over');
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDragLeave() {
      this.classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      this.classList.remove('drag-over');
      const fromId = dragSrcId;
      const toId = this.dataset.id;
      if (!fromId || fromId === toId) return;

      const fromIndex = state.memos.findIndex(m => m.id === fromId);
      const toIndex = state.memos.findIndex(m => m.id === toId);
      if (fromIndex < 0 || toIndex < 0) return;

      const [moved] = state.memos.splice(fromIndex, 1);
      state.memos.splice(toIndex, 0, moved);
      persist();
      renderSaved();
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
      stack.querySelectorAll('.memo-card').forEach(c => c.classList.remove('drag-over'));
    }

      persist();

    function startEditSection(memoId, section) {

      renderSaved();

    function cancelEdit() {
      clearEditStates();
      renderSaved();
    }

    function saveEditMemo() {
      if (!state.editingMemoId || !state.editDraft) return;
      const idx = state.memos.findIndex(mm => mm.id === state.editingMemoId);
      if (idx >= 0) {
        state.memos[idx] = ensureMemoDefaults({ ...state.memos[idx], ...state.editDraft });
        persist();
      }
      cancelEdit();
    }

    function saveEditSection() {
      if (!state.editingSection || !state.editSectionDraft) return;
      const memo = state.memos.find(m => m.id === state.editingSection.memoId);
      if (!memo || !isMergedMemo(memo)) return;

      const idx = memo.sections.findIndex(s => s.id === state.editingSection.sectionId);
      if (idx >= 0) {
        memo.sections[idx] = {
          ...memo.sections[idx],
          ...JSON.parse(JSON.stringify(state.editSectionDraft))
        };
        ensureMemoDefaults(memo);
        persist();
      }
      cancelEdit();
    }

      const footer = document.createElement('div');
      footer.className = 'section-footer';

      const urgentBtn = document.createElement('button');
      urgentBtn.type = 'button';
      urgentBtn.className = 'urgent' + (d.urgent ? ' active' : '');
      urgentBtn.textContent = '긴급';
      urgentBtn.addEventListener('click', () => {
        d.urgent = !d.urgent;
        renderSaved();
      });

      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', cancelEdit);

      const saveBtn2 = document.createElement('button');
      saveBtn2.type = 'button';
      saveBtn2.className = 'primary';
      saveBtn2.textContent = 'Save changes';
      saveBtn2.addEventListener('click', saveEditSection);

      footer.appendChild(urgentBtn);
      footer.appendChild(cancelBtn);
      footer.appendChild(saveBtn2);
      wrap.appendChild(footer);

      card.appendChild(wrap);
    }

    function saveMemo() {
      const title = (titleInput.value || '').trim();
      const subtitle = (subtitleInput.value || '').trim();
      const priority = parseInt(state.composer.priority, 10) || 3;

      const lines = state.composer.lines.map(l => ensureLineDefaults({
        id: l.id || uid(),
        text: (l.text || '').trim(),
        checked: !!l.checked,
        checkedAt: l.checked ? (l.checkedAt || nowStamp()) : null,
        subPrio: (l.subPrio == null ? 2 : l.subPrio),
        tag: l.tag || '',
        progressLogs: Array.isArray(l.progressLogs) ? l.progressLogs : []
      }));

      const memo = ensureMemoDefaults({
        id: uid(),
        createdAt: nowStamp(),
        title,
        subtitle,
        priority,
        urgent: false,
        bg: DEFAULT_BG,
        lines
      });

      state.memos.unshift(memo);
      persist();

      titleInput.value = '';
      subtitleInput.value = '';
      state.composer.lines = [ensureLineDefaults({
        id: uid(), text: '', checked: false, checkedAt: null, subPrio: 2, tag: '', progressLogs: []
      })];

      renderComposerLines();
      renderSaved();
    }

    function buildSectionFromMemo(m) {
      return {
        id: uid(),
        sourceMemoId: m.id,
        subtitle: m.subtitle || '',
        priority: m.priority == null ? 3 : m.priority,
        urgent: !!m.urgent,
        createdAt: m.createdAt || nowStamp(),
        lines: JSON.parse(JSON.stringify(m.lines || []))
      };
    }

    function mergeSameTitleMemosOnce() {
      clearEditStates();
      const map = new Map();
      const result = [];

      state.memos.forEach(memo => {
        ensureMemoDefaults(memo);
        const key = (memo.title || '').trim() || '(Untitled)';

        if (!map.has(key)) {
          map.set(key, result.length);
          result.push(memo);
          return;
        }

        const targetIndex = map.get(key);
        let target = result[targetIndex];

        if (!isMergedMemo(target)) {
          target = {
            id: target.id,
            createdAt: target.createdAt,
            title: target.title,
            bg: target.bg || DEFAULT_BG,
            sections: [buildSectionFromMemo(target)]
          };
          result[targetIndex] = target;
        }

        const sectionsToAdd = isMergedMemo(memo)
          ? JSON.parse(JSON.stringify(memo.sections || []))
          : [buildSectionFromMemo(memo)];

        sectionsToAdd.forEach(s => {
          if (!s.id) s.id = uid();
          if (s.priority == null) s.priority = 3;
          if (s.urgent == null) s.urgent = false;
          if (!Array.isArray(s.lines)) s.lines = [];
          s.lines.forEach(l => ensureLineDefaults(l));
        });

        target.sections.push(...sectionsToAdd);
        target.createdAt =
          target.sections.slice().sort((a, b) => stampToTime(b.createdAt) - stampToTime(a.createdAt))[0]?.createdAt ||
          target.createdAt;
      });

      state.memos = result.map(m => ensureMemoDefaults(m));
    }

    addLineBtn.addEventListener('click', () => addLine('', false));
    saveBtn.addEventListener('click', saveMemo);

    sortBtn.addEventListener('click', () => {
      state.sortMode = (state.sortMode === 'priority') ? 'time' : 'priority';
      updateSortButton();
      renderSaved();
    });

    groupBtn.addEventListener('click', () => {
      mergeSameTitleMemosOnce();
      persist();
      renderSaved();
    });

    titleInput.addEventListener('input', () => state.composer.title = titleInput.value);
    subtitleInput.addEventListener('input', () => state.composer.subtitle = subtitleInput.value);

    function renderPrioritySeg(el, current, onChange) {
      el.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'prio-seg';
      for (let i = 1; i <= 5; i++) {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'seg' + (i === current ? ' active' : '');
        b.textContent = String(i);
        b.addEventListener('click', () => onChange(i));
        box.appendChild(b);
      }
      el.appendChild(box);
    }

    function renderSubPrioSeg(el, current, onChange) {
      el.innerHTML = '';
      const box = document.createElement('div');
      box.className = 'prio-seg sub-seg';
      const opts = [1, 2, 3, 4, 5];
      opts.forEach(v => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'seg' + (v === (parseInt(current, 10) || 2) ? ' active' : '');
        b.textContent = (v === 4) ? 'S' : (v === 5 ? '!' : String(v));
        b.addEventListener('click', () => onChange(v));
        box.appendChild(b);
      });
      el.appendChild(box);
    }

    function refreshComposerPriority() {
      renderPrioritySeg(prioritySegEl, state.composer.priority, (val) => {
        state.composer.priority = val;
        refreshComposerPriority();
      });
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
      const fileName = prompt("저장할 파일 이름을 입력하세요:", "memos-backup.json");
      if (!fileName) return;

      const dataStr = JSON.stringify(state.memos, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = fileName.endsWith(".json") ? fileName : fileName + ".json";
      a.click();

      URL.revokeObjectURL(url);
    });

    const importFileInput = document.getElementById('importFileInput');

    document.getElementById('importBtn').addEventListener('click', () => {
      importFileInput.value = '';
      importFileInput.click();
    });

    importFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (Array.isArray(imported)) {
            clearEditStates();
            state.memos = imported.map(m => ensureMemoDefaults(m));
            persist();
            renderSaved();
            alert('메모를 불러왔습니다!');
          } else {
            alert('잘못된 파일 형식입니다.');
          }
        } catch (err) {
          alert('불러오기 실패: ' + err.message);
        }
      };
      reader.readAsText(file);
    });

    function renderSPanel() {
      const listEl = document.getElementById('sList');
      if (!listEl) return;
      listEl.innerHTML = '';

      const sItems = [];

      state.memos.forEach(m => {
        if (isMergedMemo(m)) {
          (m.sections || []).forEach(section => {
            (section.lines || []).forEach(l => {
              ensureLineDefaults(l);
              if ((parseInt(l.subPrio, 10) || 0) === 4 && !l.checked) {
                sItems.push({ memo: m, section, line: l });
              }
            });
          });
        } else {
          (m.lines || []).forEach(l => {
            ensureLineDefaults(l);
            if ((parseInt(l.subPrio, 10) || 0) === 4 && !l.checked) {
              sItems.push({ memo: m, section: null, line: l });
            }
          });
        }
      });

      sItems.sort((a, b) => {
        const ap = a.section ? sectionPriorityValue(a.section) : memoPriorityValue(a.memo);
        const bp = b.section ? sectionPriorityValue(b.section) : memoPriorityValue(b.memo);
        if (bp !== ap) return bp - ap;
        const at = stampToTime(a.section ? a.section.createdAt : a.memo.createdAt);
        const bt = stampToTime(b.section ? b.section.createdAt : b.memo.createdAt);
        return bt - at;
      });

      if (!sItems.length) {
        const empty = document.createElement('div');
        empty.className = 'progress-empty';
        empty.textContent = '샘플링 목록 비어있음';
        listEl.appendChild(empty);
        return;
      }

      sItems.forEach(({ memo, section, line }) => {
        const row = document.createElement('div');
        row.className = 'sline';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !!line.checked;
        cb.addEventListener('change', () => {
          line.checked = cb.checked;
          line.checkedAt = cb.checked ? nowStamp() : null;
          persist();
          renderSaved();
        });

        const badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = 'S';

        const tagBox = document.createElement('div');
        tagBox.className = 'tag-badge';
        tagBox.textContent = line.tag || '-';

        const text = document.createElement('div');
        text.className = 's-text';
        text.textContent = line.text || '';

        const meta = document.createElement('div');
        meta.className = 's-meta';
        meta.textContent = section
          ? `${memo.title || '(Untitled)'} / ${section.subtitle || '(소제목 없음)'}`
          : (memo.subtitle || '(Untitled)');

        row.appendChild(cb);
        row.appendChild(badge);
        row.appendChild(tagBox);
        row.appendChild(text);
        row.appendChild(meta);
        listEl.appendChild(row);
      });
    }

    function focusEditLine(index) {
      const nodes = document.querySelectorAll('.line textarea.memo-edit');
      const el = nodes[index];
      if (el) {
        el.focus();
        const len = el.value.length;
        el.setSelectionRange(len, len);
      }
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.menu') && !e.target.closest('.kebab')) {
        document.querySelectorAll('.menu.open').forEach(el => el.classList.remove('open'));
        document.querySelectorAll('.submenu.open').forEach(el => el.classList.remove('open'));
      }
    });

    load();
    updateSortButton();
    ensureAtLeastOneLine();
    renderComposerLines();
    refreshComposerPriority();
    renderSaved();
  </script>
</body>
</html>
